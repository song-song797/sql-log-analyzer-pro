services:
  - type: web
    name: sql-log-analyzer-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run server
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_PORT
        value: 4399
      - key: SESSION_TTL_DAYS
        value: 14
      - key: UPLOAD_ROOT
        value: /var/data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: sql-log-analyzer-db
          property: connectionString

databases:
  - name: sql-log-analyzer-db
    plan: starter
